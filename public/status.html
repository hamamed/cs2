<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CS2 Server Status</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#f4f5f8; --surface:#fff; --surface-2:#f7f9fc; --text:#11223f; --text-secondary:#71809a;
    --accent:#1f83ff; --accent-dark:#0a6ae0; --accent-soft:#e8f2ff; --gold:#ffb400; --teal:#15c5c0;
    --green:#19c37d; --red:#e0394e; --line:#eceef3; --shadow:0 6px 24px rgba(17,34,63,.06); }
  [data-bs-theme="dark"]{ --bg:#0f141b; --surface:#1a212b; --surface-2:#232c38; --text:#e6ebf2; --text-secondary:#93a1b3;
    --accent-soft:#16263e; --line:#2b3441; --shadow:0 6px 24px rgba(0,0,0,.35); }
  *{font-family:"Nunito",system-ui,sans-serif}
  body{background:var(--bg);color:var(--text);min-height:100vh;margin:0;
    background-image:radial-gradient(700px 380px at 85% -5%,rgba(31,131,255,.10),transparent 60%),
      radial-gradient(620px 360px at -5% 8%,rgba(21,197,192,.10),transparent 55%)}
  h1,h2,h3,h5{letter-spacing:-.01em}
  .wrap{max-width:680px;margin:0 auto;padding:32px 16px}
  .brand{font-family:"Nunito";font-weight:900;font-size:1.6rem;display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:8px}
  .brand .logo{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;font-size:1.4rem;color:#fff;
    background:linear-gradient(135deg,var(--accent),#54a8ff);box-shadow:0 8px 18px rgba(31,131,255,.4)}
  .card2{background:var(--surface);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
  .hero{position:relative;aspect-ratio:16/7;background:#0c0c0c;display:flex;align-items:flex-end}
  .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85}
  .hero .ov{position:relative;width:100%;padding:18px 20px;background:linear-gradient(transparent,rgba(0,0,0,.75));color:#fff}
  .hero .mapname{font-weight:900;font-size:1.35rem;text-shadow:0 2px 6px rgba(0,0,0,.5)}
  .hero .mapsub{font-weight:700;opacity:.85;font-size:.9rem}
  .hero-empty{aspect-ratio:16/7;display:grid;place-items:center;color:var(--text-secondary);font-weight:800;background:var(--surface-2)}
  .pill{display:inline-flex;align-items:center;gap:8px;font-weight:900;border-radius:999px;padding:.5rem 1rem;font-size:.9rem}
  .on{background:#e4f8ee;color:var(--green)} .off{background:#fdecee;color:var(--red)}
  [data-bs-theme="dark"] .on{background:#10301f}[data-bs-theme="dark"] .off{background:#3a1a1f}
  .dot{width:10px;height:10px;border-radius:50%;background:currentColor;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 currentColor;opacity:1}50%{box-shadow:0 0 0 5px transparent;opacity:.5}}
  .stat{background:var(--surface-2);border:1px solid var(--line);border-radius:16px;padding:14px;text-align:center}
  .stat .lab{font-size:.66rem;font-weight:800;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em}
  .stat .val{font-size:1.25rem;font-weight:900;margin-top:3px}
  .connbox{background:#0c0c0c;border-radius:16px;padding:6px 6px 6px 16px;display:flex;align-items:center;gap:10px}
  .connbox code{font-family:"JetBrains Mono",monospace;color:#7fffb0;font-size:.9rem;flex:1;overflow:auto;white-space:nowrap;padding:8px 0}
  .copy{border:none;border-radius:12px;background:var(--accent);color:#fff;font-weight:800;padding:10px 16px;cursor:pointer;white-space:nowrap}
  .copy:hover{background:var(--accent-dark)} .copy.ok{background:var(--green)}
  .steambtn{display:inline-flex;align-items:center;gap:8px;background:#1b2838;color:#fff;border-radius:12px;padding:10px 16px;font-weight:800;text-decoration:none}
  .steambtn:hover{background:#2a3f5a;color:#fff}
  a.maplink{color:inherit;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="logo"><i class="fa-solid fa-crosshairs"></i></span> CS2 Server</div>
  <p class="text-center mb-4" style="color:var(--text-secondary);font-weight:700">Live server status — share this page with your friends</p>

  <div class="card2 mb-3">
    <a class="maplink" id="heroLink" target="_blank" rel="noopener">
      <div id="hero"></div>
    </a>
    <div class="p-3 p-md-4">
      <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
        <span class="pill off" id="pill"><span class="dot"></span><span id="pillTxt">…</span></span>
        <span style="color:var(--text-secondary);font-weight:700;font-size:.85rem" id="updated"></span>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-4"><div class="stat"><div class="lab"><i class="fa-solid fa-trophy me-1"></i>Mode</div><div class="val" id="vMode">—</div></div></div>
        <div class="col-4"><div class="stat"><div class="lab"><i class="fa-solid fa-users me-1"></i>Players</div><div class="val" id="vPlayers">—</div></div></div>
        <div class="col-4"><div class="stat"><div class="lab"><i class="fa-solid fa-robot me-1"></i>Bots</div><div class="val" id="vBots">—</div></div></div>
      </div>

      <label style="font-weight:800;font-size:.72rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em" class="mb-1 d-block">
        <i class="fa-solid fa-link me-1"></i>Connect — paste in the CS2 console (press <kbd>~</kbd>)</label>
      <div class="connbox mb-2"><code id="conn">…</code><button class="copy" id="copyBtn" onclick="copyConn()"><i class="fa-solid fa-copy"></i> Copy</button></div>
      <a class="steambtn" id="steamConnect"><i class="fa-brands fa-steam"></i> Join via Steam</a>
    </div>
  </div>
  <p class="text-center" style="color:var(--text-secondary);font-weight:700;font-size:.8rem">Auto-refreshes every 10s · read-only</p>
</div>

<script>
const $=s=>document.querySelector(s);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const MODES={'0,0':'Casual','0,1':'Competitive','0,2':'Wingman','1,2':'Deathmatch','1,0':'Arms Race','1,1':'Demolition'};
const OFFICIAL_MAPS=['de_ancient','de_anubis','de_inferno','de_mirage','de_nuke','de_overpass','de_vertigo','de_dust2','de_cache','de_train'];
function mapImg(name){ name=(name||'').toLowerCase().replace(/[^a-z0-9_]/g,''); return OFFICIAL_MAPS.includes(name)?'https://cdn.jsdelivr.net/gh/ghostcap-gaming/cs2-map-images@main/cs2/'+name+'.png':''; }
let connStr='';

async function load(){
  let d; try{ d=await (await fetch('/api/public')).json(); }catch(e){ return; }
  const pill=$('#pill'), host=location.hostname;
  pill.className='pill '+(d.running?'on':'off');
  $('#pillTxt').textContent=d.running?'ONLINE':'OFFLINE';

  // hero / map image
  const hero=$('#hero'), link=$('#heroLink');
  if(d.mapInfo && d.mapInfo.preview){
    hero.className='hero';
    hero.innerHTML='<img src="'+esc(d.mapInfo.preview)+'" alt=""><div class="ov"><div class="mapname">'+esc(d.mapInfo.title)+'</div><div class="mapsub"><i class="fa-brands fa-steam me-1"></i>Workshop map — click to view on Steam</div></div>';
    link.href=d.mapInfo.url;
  } else {
    const img=mapImg(d.mapName);
    if(img){
      hero.className='hero';
      hero.innerHTML='<img src="'+img+'" alt=""><div class="ov"><div class="mapname">'+esc(d.mapName)+'</div><div class="mapsub">Official map</div></div>';
      link.removeAttribute('href');
    } else {
      hero.className='hero-empty';
      hero.innerHTML='<div><i class="fa-solid fa-map me-2"></i>'+esc(d.mapName||'—')+'</div>';
      link.removeAttribute('href');
    }
  }

  $('#vMode').textContent = d.isWorkshop ? 'Custom' : (MODES[d.game_type+','+d.game_mode]||'—');
  $('#vPlayers').textContent = d.players ? d.players.humans : (d.running?'0':'—');
  $('#vBots').textContent = d.players ? (d.players.bots!=null?d.players.bots:'—') : (d.running?'0':'—');

  connStr='connect '+host+':'+(d.port||'27015')+(d.password?'; password '+d.password:'');
  $('#conn').textContent=connStr;
  $('#steamConnect').href='steam://connect/'+host+':'+(d.port||'27015')+(d.password?'/'+d.password:'');
  const now=new Date(); $('#updated').textContent='Updated '+now.toLocaleTimeString();
}
function copyConn(){
  const b=$('#copyBtn');
  const done=()=>{ b.classList.add('ok'); b.innerHTML='<i class="fa-solid fa-check"></i> Copied!'; setTimeout(()=>{b.classList.remove('ok'); b.innerHTML='<i class="fa-solid fa-copy"></i> Copy';},1400); };
  if(navigator.clipboard) navigator.clipboard.writeText(connStr).then(done).catch(fb); else fb();
  function fb(){ const t=document.createElement('textarea'); t.value=connStr; document.body.appendChild(t); t.select(); try{document.execCommand('copy')}catch(e){} t.remove(); done(); }
}
try{ const t=localStorage.getItem('cs2theme'); if(t)document.documentElement.setAttribute('data-bs-theme',t); }catch(e){}
load(); setInterval(load, 10000);
</script>
</body>
</html>
